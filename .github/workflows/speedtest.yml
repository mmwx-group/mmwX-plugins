name: SpeedTester Build and Release

# 妙妙屋X 家用测速端(plugins/speedtest)独立打包。tag 形如 speedtest-v1.2.3 触发。
on:
  workflow_dispatch:
  push:
    tags:
      - 'speedtest-v*'

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, ext: '' }
          - { goos: linux, goarch: arm64, ext: '' }
          - { goos: windows, goarch: amd64, ext: '.exe' }
          - { goos: windows, goarch: arm64, ext: '.exe' }
          - { goos: darwin, goarch: amd64, ext: '' }
          - { goos: darwin, goarch: arm64, ext: '' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: speedtest/go.sum
      - name: Build
        working-directory: speedtest
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p ../build
          go build -trimpath -ldflags="-s -w" -o ../build/mmwx-speedtester-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .
      - uses: actions/upload-artifact@v4
        with:
          name: mmwx-speedtester-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/mmwx-speedtester-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/speedtest-v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Create checksums
        run: |
          cd release
          sha256sum mmwx-speedtester-* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            release/mmwx-speedtester-*
            release/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 推送到 ghcr.io 需要
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        # arm64 在 amd64 runner 上跨架构 build 需要 qemu

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # tag 推送时才登录,workflow_dispatch / push main 时跳过登录(只 build 不 push)
        if: startsWith(github.ref, 'refs/tags/speedtest-v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # 镜像名 owner 需要小写;GitHub Actions 表达式没有 lower 函数,这里把仓库 owner 用
          # GHCR 接受的小写形式手工写死。如果以后 fork 需修改:把 iluobei 换成你的小写用户名。
          images: ghcr.io/${{ github.repository_owner }}/mmwx-speedtester
          tags: |
            # tag speedtest-v1.2.3 → 镜像 1.2.3 / 1.2 / 1 / latest
            type=match,pattern=speedtest-v(.*),group=1
            type=match,pattern=speedtest-v(\d+\.\d+)\.\d+,group=1
            type=match,pattern=speedtest-v(\d+)\.\d+\.\d+,group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/speedtest-v') }}
            # main push:打 edge;PR / 其它 ref:打 sha-<short>(只 build 不 push)
            type=edge,branch=main
            type=sha,prefix=sha-,format=short

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./speedtest
          file: ./speedtest/Dockerfile
          platforms: linux/amd64,linux/arm64
          # tag 触发才推,其它情况只 build 验证(免污染 GHCR + 防误 push)
          push: ${{ startsWith(github.ref, 'refs/tags/speedtest-v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
